<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Store</title>
</head>

<body class="h-[400vh]">
    <header class="shadow-2xl mb-4">
        <nav
            class="px-6 shadow-sm h-[70px] flex justify-between items-center fixed top-0 left-0 right-0 z-50 bg-white md:px-18 ">
            <a href="">
                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="w-8 h-8 flex items-center justify-center rounded-md bg-blue-600"><i
                            class="fa-solid fa-bag-shopping text-white text-xl"></i></div>
                    <h3 class="text-xl sm:text-2xl font-bold">Store</h3>
                </div>
            </a>
            <div class="text-xl sm:text-2xl flex items-center gap-2 sm:gap-3 md:gap-5">
                <a href="">
                    <div class="text-blue-600 font-bold flex items-center">
                        <i class="fa-solid fa-border-all"></i>
                        <span class="text-xl">Admin</span>
                    </div>
                </a>
                <a href=""><i class="fa-solid fa-circle-user"></i></a>
                <div>
                    <a href="">
                        <i class="fa-solid fa-cart-shopping relative">
                            <span
                                class="bg-blue-600 h-5 w-5 rounded-full absolute right-[-3px] top-[-10px] text-sm text-white">0</span>
                        </i>
                    </a>
                </div>
            </div>
        </nav>

        <ul
            class="px-6 shadow-lg h-[70px] flex gap-5 sm:gap-10 items-center md:px-18 overflow-x-auto whitespace-nowrap font-medium mt-[70px]">
            <a class="text-blue-600" href="">
                <li>New Arrivals</li>
            </a>
            <a href="">
                <li>Electronics</li>
            </a>
            <a href="">
                <li>Fashion</li>
            </a>
            <a href="">
                <li>Home & Living</li>
            </a>
            <a href="">
                <li>Beauty</li>
            </a>
            <a href="">
                <li>Sports</li>
            </a>
            <a href="">
                <li>Offers</li>
            </a>
        </ul>
    </header>
    <section class="mx-1 sm:mx-3 sm:mt-6 relative rounded-xl overflow-hidden md:mx-18 lg:mt-10 lg:h-[600px]">
            <img class="" src="Images/Hero - img.png" alt="">
        <div class="absolute inset-0 bg-gradient-to-r from-black/80 to-transparent "></div>
        <div class="absolute left-0 top-0 bottom-0 text-white flex flex-col justify-center gap-2 sm:gap-5 items-start px-4 sm:px-7 lg:px-15 lg:gap-10">
            <span class="px-3 py-1 sm:p-0 sm:w-[120px] sm:h-[30px] lg:h-[36px] lg:w-[160px] flex justify-center rounded items-center bg-blue-600 text-sm sm:text-lg font-medium lg:text-2xl ">Limited Offer</span>
            <h2 class="text-2xl sm:text-3xl font-extrabold lg:text-7xl">New Season,<br>New Style</h2>
            <p class="text-white/80 text-sm sm:text-base lg:text-xl lg:font-medium">Upgrade your lifestyle with our premium collection of curated essentials for the modern explorer.</p>
            <button class="px-3 py-[1px] sm:p-0 sm:w-[150px] sm:h-[35px] lg:w-[180px] lg:h-[45px] lg:rounded-xl lg:font-medium flex justify-center rounded items-center bg-blue-700 text-lg sm:text-xl font-medium cursor-pointer hover:bg-blue-800 transition duration-300 ease-in-out">Shop Now</button>
        </div>
    </section>
</body>

</html>
